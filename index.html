<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>REY MOMO — Check-In Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #14141e;
    --surface2: #1c1c2e;
    --border: #2a2a40;
    --accent: #f5c842;
    --accent2: #ff6b35;
    --green: #22c55e;
    --green-dim: #16a34a22;
    --text: #e8e8f0;
    --muted: #7070a0;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a0a00 0%, #0a0a1a 60%, #0d0a00 100%);
    border-bottom: 2px solid var(--accent);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 12px;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
    flex-shrink: 0;
  }

  .header-title span {
    color: var(--accent2);
  }

  .header-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .header-stats {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
  }

  .stat-pill .num {
    font-weight: 700;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    margin-right: 4px;
  }

  .stat-pill.checked { border-color: var(--green); color: var(--green); }
  .stat-pill.total { color: var(--accent); border-color: var(--accent); }

  /* SEARCH */
  .search-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    position: sticky;
    top: 73px;
    z-index: 99;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px 11px 40px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  .clear-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    padding: 11px 16px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  .filter-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    padding: 11px 16px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }

  /* RESULTS INFO */
  .results-info {
    padding: 10px 20px;
    font-size: 12px;
    color: var(--muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  /* RESERVATION CARDS */
  .reservations-list {
    padding: 16px 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .reservation-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .reservation-card.fully-checked {
    border-color: var(--green);
  }

  .reservation-card.partially-checked {
    border-color: #ca8a04;
  }

  .card-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .card-header:active { background: var(--surface2); }

  .titular-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: #000;
    flex-shrink: 0;
  }

  .card-info {
    flex: 1;
    min-width: 0;
  }

  .titular-name {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .confirmation-id {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-family: monospace;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .people-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
    line-height: 1;
  }

  .checkin-progress {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }

  .checkin-progress.all-done { color: var(--green); font-weight: 700; }

  .expand-icon {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .reservation-card.open .expand-icon {
    transform: rotate(180deg);
  }

  /* PARTICIPANTS */
  .participants-panel {
    display: none;
    border-top: 1px solid var(--border);
  }

  .reservation-card.open .participants-panel {
    display: block;
  }

  .participant-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border)33;
    transition: background 0.15s;
    cursor: pointer;
  }

  .participant-row:last-child { border-bottom: none; }

  .participant-row:active { background: var(--surface2); }

  .participant-row.checked {
    background: var(--green-dim);
  }

  .check-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 14px;
    background: var(--surface2);
  }

  .participant-row.checked .check-circle {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  .participant-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
  }

  .participant-row.checked .participant-name {
    text-decoration: line-through;
    color: var(--muted);
  }

  .checkin-time {
    font-size: 11px;
    color: var(--green);
    font-weight: 600;
    white-space: nowrap;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  /* FLOATING EXPORT BTN */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 14px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px #f5c84244;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .fab:active { transform: scale(0.96); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    padding: 12px 24px;
    border-radius: 30px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* HIGHLIGHT */
  mark {
    background: #f5c84255;
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  @media (min-width: 600px) {
    .reservations-list { padding: 20px 24px 100px; }
    header { padding: 18px 24px; }
    .search-bar { padding: 14px 24px; }
  }
</style>
</head>

const LS_KEY = 'rey_momo_checkins';
let checkins = {};
let filterPendingOnly = false;
let openCards = new Set();

function loadCheckins() {
  try { checkins = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
  catch(e) { checkins = {}; }
}

function saveCheckins() {
  localStorage.setItem(LS_KEY, JSON.stringify(checkins));
}

function getKey(reservationId, participant) {
  return reservationId + '::' + participant;
}

function isChecked(reservationId, participant) {
  return !!checkins[getKey(reservationId, participant)];
}

function toggleCheckin(reservationId, participant) {
  const key = getKey(reservationId, participant);
  if (checkins[key]) {
    delete checkins[key];
  } else {
    checkins[key] = { time: new Date().toISOString(), name: participant };
  }
  saveCheckins();
  updateStats();
  renderList(document.getElementById('searchInput').value);
}

function normalize(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const q = normalize(query);
  const n = normalize(text);
  let result = '';
  let i = 0;
  while (i < text.length) {
    const idx = n.indexOf(q, i);
    if (idx === -1) { result += escHtml(text.slice(i)); break; }
    result += escHtml(text.slice(i, idx));
    result += '<mark>' + escHtml(text.slice(idx, idx + q.length)) + '</mark>';
    i = idx + q.length;
  }
  return result;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getInitials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('es-DO', {hour:'2-digit', minute:'2-digit'});
}

function updateStats() {
  const totalRes = DATA.length;
  let checkedPeople = 0;
  DATA.forEach(r => {
    r.participants.forEach(p => {
      if (isChecked(r.id, p)) checkedPeople++;
    });
  });
  document.getElementById('totalCount').textContent = totalRes;
  document.getElementById('checkedCount').textContent = checkedPeople;
}

function toggleFilter() {
  filterPendingOnly = !filterPendingOnly;
  const btn = document.getElementById('filterPending');
  btn.classList.toggle('active', filterPendingOnly);
  renderList(document.getElementById('searchInput').value);
}

function renderList(query) {
  const q = normalize(query || '');
  const list = document.getElementById('reservationsList');
  const empty = document.getElementById('emptyState');

  let filtered = DATA.filter(r => {
    const matchesTitular = normalize(r.titular).includes(q);
    const matchesId = normalize(r.id).includes(q);
    const matchesParticipant = r.participants.some(p => normalize(p).includes(q));
    const matchesQuery = !q || matchesTitular || matchesId || matchesParticipant;

    if (!matchesQuery) return false;

    if (filterPendingOnly) {
      const allChecked = r.participants.every(p => isChecked(r.id, p));
      if (allChecked) return false;
    }

    return true;
  });

  document.getElementById('resultsInfo').textContent =
    q || filterPendingOnly
      ? `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''} de ${DATA.length} reservaciones`
      : `${DATA.length} reservaciones · ${Object.keys(checkins).length} check-ins registrados`;

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map(r => {
    const checkedCount = r.participants.filter(p => isChecked(r.id, p)).length;
    const total = r.participants.length;
    const allDone = checkedCount === total;
    const partDone = checkedCount > 0 && !allDone;
    const isOpen = openCards.has(r.id);

    // Filter participants if search matches specific ones
    const showParticipants = r.participants;

    return `
    <div class="reservation-card ${allDone ? 'fully-checked' : partDone ? 'partially-checked' : ''} ${isOpen ? 'open' : ''}" id="card-${r.id}">
      <div class="card-header" onclick="toggleCard('${r.id}')">
        <div class="titular-avatar">${getInitials(r.titular)}</div>
        <div class="card-info">
          <div class="titular-name">${highlight(r.titular, query)}</div>
          <div class="confirmation-id">${highlight(r.id, query)}</div>
        </div>
        <div class="card-meta">
          <div class="people-count">${checkedCount}/${total}</div>
          <div class="checkin-progress ${allDone ? 'all-done' : ''}">${allDone ? '✓ Completo' : 'participantes'}</div>
        </div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="participants-panel">
        ${showParticipants.map(p => {
          const checked = isChecked(r.id, p);
          const time = checked ? formatTime(checkins[getKey(r.id, p)].time) : '';
          return `
          <div class="participant-row ${checked ? 'checked' : ''}" onclick="toggleCheckin('${r.id}', ${JSON.stringify(p)})">
            <div class="check-circle">${checked ? '✓' : ''}</div>
            <div class="participant-name">${highlight(p, query)}</div>
            ${checked ? `<div class="checkin-time">${time}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  if (openCards.has(id)) {
    openCards.delete(id);
  } else {
    openCards.add(id);
  }
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('open', openCards.has(id));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function clearCheckins() {
  if (!confirm('¿Resetear TODOS los check-ins? Esta acción no se puede deshacer.')) return;
  checkins = {};
  saveCheckins();
  updateStats();
  renderList(document.getElementById('searchInput').value);
  showToast('Check-ins reseteados');
}

function exportLog() {
  const rows = [['Confirmación', 'Titular', 'Participante', 'Hora Check-In']];
  DATA.forEach(r => {
    r.participants.forEach(p => {
      const key = getKey(r.id, p);
      if (checkins[key]) {
        rows.push([r.id, r.titular, p, new Date(checkins[key].time).toLocaleString('es-DO')]);
      }
    });
  });

  if (rows.length === 1) { showToast('No hay check-ins aún'); return; }

  const csv = rows.map(row => row.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'checkin_rey_momo_' + new Date().toISOString().slice(0,16).replace('T','_') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✓ Exportado ${rows.length - 1} check-ins`);
}

let debounceTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => renderList(e.target.value), 200);
});

// Init
loadCheckins();
updateStats();
renderList('');
</script>
